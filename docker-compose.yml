version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aicouncil-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_ORIGIN=http://16.171.181.212
      - MONGO_URI=mongodb+srv://light20031112_db_user:HppjDjMjq65H5x35@cluster0.5pv8niv.mongodb.net/aicouncil?retryWrites=true&w=majority
    networks:
      - aicouncil-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://16.171.181.212:3000/api
    container_name: aicouncil-frontend
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
