version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aicouncil-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_ORIGIN=http://frontend:3000
      # Add other backend environment variables as needed
      # - MONGODB_URI=mongodb://mongo:27017/aicouncil
    depends_on:
      - mongo
    networks:
      - aicouncil-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aicouncil-frontend
    ports:
      - "5173:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - aicouncil-network
    restart: unless-stopped

  mongo:
    image: mongo:7-alpine
    container_name: aicouncil-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=aicouncil
    volumes:
      - mongo-data:/data/db
    networks:
      - aicouncil-network
    restart: unless-stopped

networks:
  aicouncil-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
